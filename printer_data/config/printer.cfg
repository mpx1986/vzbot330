########################
########################
# Stepper x
########################

[stepper_x] ## Drive 0 h rechts
enable_pin: !PF14
step_pin: PF13  # Drive0
dir_pin: PF12     
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 40
endstop_pin: !PG9
position_endstop: 0
position_max: 315
homing_speed: 100
homing_retract_dist: 0


[tmc5160 stepper_x] 
cs_pin: PC4
spi_bus: spi1
run_current: 2.00
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: false
driver_TBL: 0
driver_TOFF: 1
driver_HSTRT: 0
driver_HEND: 4

[stepper_x1] ## Drive 1 v links
enable_pin: !PF15
step_pin: PG0  # Drive1
dir_pin: PG1
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200

[tmc5160 stepper_x1] 
cs_pin: PD11
spi_bus: spi1
run_current: 2.00
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: false
driver_TBL: 0
driver_TOFF: 1
driver_HSTRT: 0
driver_HEND: 4

########################
########################
# Stepper Y
########################

[stepper_y] ### Drive 2 h links
enable_pin: !PG5
step_pin: PF11  # Drive2
dir_pin: !PG3
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 40
endstop_pin: PG10
position_endstop: 0
position_max: 320
homing_speed: 100
homing_retract_dist: 0
#step_pulse_duration: 0.000000100

[tmc5160 stepper_y] 
cs_pin: PC6
spi_bus: spi1

run_current: 2.00
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: false
driver_TBL: 2
driver_TOFF: 1
driver_HSTRT: 5
driver_HEND: 6

[stepper_y1] ### Drive 3 v rechts
enable_pin: !PA2
step_pin: PG4  # Drive3
dir_pin: PC1
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 40

[tmc5160 stepper_y1] 
cs_pin: PC7
spi_bus: spi1

run_current: 2.00
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: false
driver_TBL: 2
driver_TOFF: 1
driver_HSTRT: 5
driver_HEND: 6

########################
########################
# Stepper Z
########################
[stepper_z] ## Drive 4 links
enable_pin: !PG2
step_pin: PF9
dir_pin: PF10
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_min: -3
position_max: 500
homing_retract_dist: 0.0 # beacon needs this to be set to 0
homing_speed: 10
second_homing_speed: 2.5


[tmc5160 stepper_z] # Drive4
cs_pin: PF2
spi_bus: spi1
run_current: 1.0
interpolate: false
stealthchop_threshold: 0


#diag1_pin: ^!PF3

[stepper_z1] # Drive 5 rechts
enable_pin: !PF1
step_pin: PC13
dir_pin: PF0
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200


[tmc5160 stepper_z1] # Drive 5
cs_pin: PE4
spi_bus: spi1
run_current: 1.0
interpolate: false
stealthchop_threshold: 0
#diag1_pin: ^!PF3

########################
########################
# FANS
########################


########################################
# CPAP 
########################################
[fan] #        CPAP print Cooling Fan\
pin: PB10 # LED RGB
max_power: 0.9 # adjust below 1 if you would like the max speed to be slower
off_below: 0.12 # minimum speed where the fan starts spinning - on octopus pro this is correct - will be lower maybe 0 on mellow Super 8 because of different GPIO pullup and protection resistors
#cycle_time: 0.002 # = 2khz - CPAP fan driver recommended range is 2-50khz
hardware_pwm: true
shutdown_speed: 0
cycle_time: 0.00002 # = 2khz - CPAP fan driver recommended range is 2-50khz


#Macro inspired by klipper-github issue https://github.com/Klipper3d/klipper/issues/2174
[gcode_macro M106]
rename_existing: G106
gcode:
    {% set P = params.P | default(0) | int %}
    {% set S = params.S | default(255) | int %}
    {% if P == 0 %}
        G106 S{S}
    {% else %}
        {% set fan = "RSCS" if P == 2 else "Exhaust_fan" %}
        SET_FAN_SPEED FAN={fan} SPEED={S / 255}
    {% endif %}

[gcode_macro M107]
rename_existing: G107
gcode:
    {% set fan = params.P|default(1)|int %}
	{% if fan == 2 %}
		SET_FAN_SPEED FAN=RSCS SPEED=0
	{% elif fan == 3 %}
		SET_FAN_SPEED FAN=Exhaust_fan SPEED=0   
	{% else %}
	  SET_FAN_SPEED FAN=RSCS SPEED=0  
	  SET_FAN_SPEED FAN=Exhaust_fan SPEED=0  
	  G107
	{% endif %}




