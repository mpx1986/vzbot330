# HEIZBED
########################

[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PF3
#control: watermark
min_temp: 0
max_temp: 120
max_power: 0.7

#control: pid 
#pid_kp: 45.163            
#pid_ki: 2.105           
#pid_kd: 242.185

########################
########################
## LED
########################

[led caselight]
white_pin: PE5
cycle_time: 0.001
initial_WHITE: 0.20

[gcode_macro Caselight_on]
gcode:  SET_PIN PIN=caselight VALUE=0.5

[gcode_macro Caselight_off]
gcode:  SET_PIN PIN=caselight VALUE=0


##############################################################################
## NOZZLE WIPER - A nozzle purge bucket and brush for the Voron 0.1 and other
##                printers for ants
##
## Configuration:
##
## 1.  Set the correct PWM pin that you connected the Orange wire
##     to in the [servo wipeServo] section replacing XXNN
## 2.  Home X, Y and Z axes
## 3.  Lower Z by at least 35mm
## 4.  Check Position of wiper Start and End position
###############################################################################

[servo wipeServo]
pin: PG11
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
maximum_servo_angle: 180
initial_angle: 10
#initial_pulse_width: 0.0005

[gcode_macro CLEAN_NOZZLE]
gcode:
   G1 Z 25
   SET_SERVO SERVO=wipeServo ANGLE=94  
   G4 P1500
   G1 X155 Y313 F10000                 # Start position Wiper
   G1 X197 F10000                     # End position Wiper
   G1 X155 F10000                     # Start position Wiper
   G1 X197 F10000
   G1 X155 F10000    # End position Wiper
   G1 X197 Y313 F5000                 # custom positio after wipe   
   G4 P1500
   SET_SERVO SERVO=wipeServo ANGLE=10  # OFF

########################
########################
## Z-Tilt
########################

[z_tilt]
z_positions: 
              47, 160
              380, 160
points: 
        30, 118
        300, 118
speed: 300
horizontal_move_z: 5
retries: 7
retry_tolerance: 0.005


########################
########################
### Probe
########################


[cartographer]
mcu: cartographer   
x_offset: 0                          
y_offset: 27                         
verbose: yes # For extra output

[cartographer touch]
samples: 3
max_samples: 10
EXPERIMENTAL_home_random_radius: 5
#retract_distance: 5

[adxl345]
cs_pin: cartographer:PA0
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    155, 155, 20



########################
########################
### Mesh
########################
[bed_mesh]
speed: 300
zero_reference_position: 157.5, 160
horizontal_move_z: 5
mesh_min: 20, 31
mesh_max: 310, 260
mesh_pps: 2, 2
move_check_distance: 3
probe_count: 50,50
algorithm: bicubic


[homing_override]
axes: xyz
gcode:
 {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

 SET_KINEMATIC_POSITION Z=1
 G1 Z10 F1200

 {% if home_all or 'Y' in params %}
   G28 Y
 {% endif %}
 
 {% if home_all or 'X' in params %}
   G28 X
 {% endif %}

 {% if home_all or 'Z' in params %}
   G90
   G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F3000	
   
   G28 Z
   G90
   G1 Z20 F1500
 {% endif %}    

[axis_twist_compensation]
speed: 100
horizontal_move_z: 5
calibrate_start_x: 20
calibrate_end_x: 310
calibrate_y:  160
calibrate_start_y: 31
calibrate_end_y: 235
calibrate_x: 157.5


