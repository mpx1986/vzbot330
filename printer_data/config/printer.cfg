########################
# Watercooling
########################

[thermistor water_temp]
temperature1: 0
resistance1: 27380
temperature2: 30
resistance2: 8311
temperature3: 60
resistance3: 3017

#[temperature_sensor water_cooling]
#sensor_type: water_temp
#sensor_pin: PF5  # Replace with your actual MCU pin
#min_temp: 0
#max_temp: 100
#gcode_id: W

[temperature_fan radiator_fans]
pin: PD15              # Replace with your actual fan pin
sensor_type: water_temp
sensor_pin: PF5        # Same as the sensor above
control: pid
min_speed: 0.4
max_speed: 1.0
shutdown_speed: 0.5  
min_temp: 0
max_temp: 100
target_temp: 35.0      # Target water temperature in Celsius
pid_kp: 1.0
pid_ki: 0.5
pid_kd: 0.1
hardware_pwm: True
cycle_time: 0.00004 # 25 kHz

[controller_fan pump] # FAN6 +-
pin: PD14      #FAN4
fan_speed: 1.0
shutdown_speed: 1.0
heater: extruder
stepper:stepper_x,stepper_y,stepper_z
hardware_pwm: True
cycle_time: 0.00004 # 25 kHz

